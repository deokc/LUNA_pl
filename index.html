<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA Playlist</title>
    <style>
        :root {
            --bg-deep: #0b0716;
            --card-bg: rgba(255, 255, 255, 0.03);
            --magic-pink: #a78bfa;
            --magic-gold: #f43f5e;
            --magic-purple: #6366f1;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.06);
            --active-gradient: linear-gradient(90deg, rgba(139, 92, 246, 0.15), transparent);
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(167, 139, 250, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        .main-container {
            display: flex;
            width: 90%;
            max-width: 1150px;
            height: 650px;
            background: rgba(15, 11, 28, 0.6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .main-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--magic-pink), var(--magic-purple), transparent);
            background-size: 200% 100%;
            animation: moveGradient 4s linear infinite;
            z-index: 10;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* 왼쪽 메인 영역 (회전 CD 전용 플레이어) */
        .player-left {
            flex: 1.2;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid var(--glass-border);
        }

        /* 380px로 시원하게 확대된 마법소녀 CD 레코드판 스타일 */
        .album-cover {
            width: 100%;
            aspect-ratio: 1;
            max-width: 380px;
            background: #0d0a1a;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.8), 
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 30px rgba(0, 0, 0, 0.9);
            background-image: repeating-radial-gradient(circle, rgba(255,255,255,0.008) 0px, rgba(255,255,255,0.008) 2px, transparent 3px, transparent 5px);
            margin-bottom: 35px;
            animation: float 6s ease-in-out infinite;
        }

        /* CD 가운데 홀 정밀 구현 */
        .album-cover::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 45px;
            height: 45px;
            background: #120e24; /* 테마 배경색 홀 매칭 */
            border: 5px solid rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            box-shadow: 
                inset 0 0 8px rgba(0, 0, 0, 0.9),
                0 0 0 15px rgba(0, 0, 0, 0.5);
            z-index: 5;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .album-cover img { 
            width: 100%; height: 100%; object-fit: cover; display: block;
            border-radius: 50%;
            mask-image: radial-gradient(circle, transparent 28px, #000 29px);
            -webkit-mask-image: radial-gradient(circle, transparent 28px, #000 29px);
            transition: transform 0.5s ease;
            animation: rotateCD 20s linear infinite;
            animation-play-state: paused;
        }

        .album-cover.playing img {
            animation-play-state: running;
        }

        @keyframes rotateCD {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .audio-controls {
            width: 100%;
            max-width: 380px;
        }

        .progress-area { height: 4px; background: rgba(255, 255, 255, 0.06); border-radius: 2px; margin-bottom: 25px; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--magic-purple), var(--magic-pink)); width: 0%; border-radius: 2px; box-shadow: 0 0 12px rgba(167, 139, 250, 0.5); }
        
        .buttons { display: flex; align-items: center; gap: 35px; justify-content: center; }
        .btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; transition: all 0.2s ease; padding: 5px; }
        .btn:hover { color: var(--text-main); transform: scale(1.1); }
        .play-btn { font-size: 2.5rem; color: var(--text-main); }
        .play-btn:hover { color: var(--magic-pink); transform: scale(1.1); }

        /* 오른쪽 사이드 영역 (상단 설명 + 하단 플레이리스트 정렬 구조) */
        .playlist-right {
            flex: 1;
            padding: 40px;
            background: rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 상단으로 올라온 타이틀 및 설명 배치 */
        .now-playing-info { 
            text-align: left;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .now-playing-info h2 { margin: 0; font-size: 1.8rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; line-height: 1.2; }
        .now-playing-info p { color: var(--magic-pink); margin: 8px 0 12px; font-size: 0.85rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; opacity: 0.9; }
        .track-desc { color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; margin: 0; min-height: 3.2em; font-weight: 400; word-break: keep-all; }

        .playlist-header {
            font-size: 0.8rem; font-weight: 700; margin-bottom: 15px;
            color: var(--text-main); letter-spacing: 4px; text-align: left;
            opacity: 0.4; text-transform: uppercase;
        }

        .track-list {
            list-style: none; padding: 0; margin: 0;
            overflow-y: auto; flex-grow: 1;
        }

        .track-list::-webkit-scrollbar { width: 3px; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .track-item {
            display: flex; align-items: center; padding: 14px 18px;
            border-radius: 12px; cursor: pointer; transition: all 0.25s ease;
            margin-bottom: 8px; background: transparent;
            border: 1px solid transparent;
        }

        .track-item:hover { background: rgba(255, 255, 255, 0.02); }

        .track-item.active { 
            background: var(--active-gradient); 
            border-left: 2px solid var(--magic-pink);
            border-radius: 0 12px 12px 0;
        }
        
        .track-item.active .track-title { color: var(--text-main); font-weight: 600; }
        .track-item.active .track-number { background: var(--magic-pink); }

        .track-number { 
            width: 6px; height: 6px; 
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 50%; 
            margin-right: 20px;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .track-title { flex: 1; font-size: 0.95rem; font-weight: 400; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.2s; }
        .track-duration { font-size: 0.8rem; color: var(--text-dim); opacity: 0.6; font-variant-numeric: tabular-nums; }

        @media (max-width: 768px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; align-items: flex-start; padding: 20px 0; }
            .main-container { flex-direction: column; height: auto; width: 90%; }
            .player-left { flex: unset; padding: 40px 24px; border-right: none; border-bottom: 1px solid var(--glass-border); }
            .album-cover { max-width: 280px; margin-bottom: 25px; }
            .playlist-right { flex: unset; padding: 30px 24px; height: auto; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <!-- 왼쪽 레이아웃: 가득 차오르는 380px 크기 CD 플레이어 바 -->
    <div class="player-left">
        <div class="album-cover" id="albumCover">
            <img src="" id="mainArt">
        </div>
        <div class="audio-controls">
            <div class="progress-area" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="buttons">
                <button class="btn" onclick="prevTrack()">◀◀</button>
                <button class="btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="btn" onclick="nextTrack()">▶▶</button>
            </div>
        </div>
    </div>

    <!-- 오른쪽 레이아웃: 상단 상세 설명창 + 하단 리스트업 구조 -->
    <div class="playlist-right">
        <div class="now-playing-info">
            <h2 id="displayTitle">곡을 선택해주세요</h2>
            <p id="displayAlbum">LUNA Playlist</p>
            <div class="track-desc" id="displayDesc">꿈과 희망의 멜로디... ✨</div>
        </div>

        <div class="playlist-header">LUNA PLAYLIST</div>
        <ul class="track-list" id="trackList"></ul>
    </div>
</div>

<audio id="mainAudio"></audio>

<script>
    const playlist = [
        { 
            title: "루미나 시티 : Night", 
            link: "https://raw.githubusercontent.com/deokc/RUNA_pl/main/%EB%A3%A8%EB%AF%B8%EB%82%98%20%EC%8B%9C%ED%8B%B0%20_%20Night_02.mp3", 
            duration: "03:24", 
            desc: "마법소녀 세계관을 담아낸 소개곡.",
            art: "https://raw.githubusercontent.com/deokc/LUNA_pl/refs/heads/main/%EB%82%98%EC%9D%B4%ED%8A%B8%EC%BB%A4%EB%B2%8401.png"
        },
        { 
            title: "GLASS HEART PROTOCOL", 
            link: "https://raw.githubusercontent.com/deokc/RUNA_pl/main/GLASS%20HEART%20PROTOCOL_01.mp3", 
            duration: "03:56", 
            desc: "점점 자신을 잃어가는 내면을 담아낸 곡.",
            art: "https://raw.githubusercontent.com/deokc/LUNA_pl/refs/heads/main/%ED%94%84%EB%A1%9C%ED%86%A0%EC%BD%9C%EC%BB%A4%EB%B2%8401.png"
        },
        { 
            title: "Don’t Take You Away", 
            link: "https://raw.githubusercontent.com/deokc/RUNA_pl/main/Don%E2%80%99t%20Take%20You%20Away_03.mp3", 
            duration: "03:56", 
            desc: "마법소녀도 사람이야.. 사람..",
            art: "https://raw.githubusercontent.com/deokc/LUNA_pl/refs/heads/main/%EB%82%98%EC%9D%B4%ED%8A%B8%EC%BB%A4%EB%B2%8401.png"
        },
        { 
            title: "별빛 같은 우리", 
            link: "https://raw.githubusercontent.com/deokc/RUNA_pl/main/%EB%B3%84%EB%B9%9B%20%EA%B0%99%EC%9D%80%20%EC%9A%B0%EB%A6%AC_02.mp3", 
            duration: "03:17", 
            desc: "그래도 우리는 괜찮아.",
            art: "https://raw.githubusercontent.com/deokc/LUNA_pl/refs/heads/main/%EB%B3%84%EB%B9%9B%EC%BB%A4%EB%B2%8401.png"
        }
    ];

    const audio = document.getElementById('mainAudio');
    const trackListElem = document.getElementById('trackList');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    const displayTitle = document.getElementById('displayTitle');
    const displayDesc = document.getElementById('displayDesc');
    
    const albumCover = document.getElementById('albumCover');
    const mainArt = document.getElementById('mainArt');

    let currentIndex = 0;

    function renderPlaylist() {
        trackListElem.innerHTML = '';
        playlist.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = `track-item ${index === currentIndex ? 'active' : ''}`;
            li.innerHTML = `
                <span class="track-number"></span>
                <span class="track-title">${track.title}</span>
                <span class="track-duration">${track.duration}</span>
            `;
            li.onclick = () => loadTrack(index);
            trackListElem.appendChild(li);
        });
    }

    function loadTrack(index) {
        currentIndex = index;
        const track = playlist[index];
        audio.src = track.link;
        
        if (track.art) {
            mainArt.src = track.art;
        }
        
        displayTitle.textContent = track.title;
        displayDesc.textContent = track.desc;
        renderPlaylist();
        audio.play();
        
        playBtn.innerHTML = "⏸";
        albumCover.classList.add('playing');
        
        const activeItem = trackListElem.querySelector('.active');
        if (activeItem) {
            activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function togglePlay() {
        if (audio.paused) {
            if (!audio.src) loadTrack(0);
            else { 
                audio.play(); 
                playBtn.innerHTML = "⏸"; 
                albumCover.classList.add('playing');
            }
        } else {
            audio.pause();
            playBtn.innerHTML = "▶";
            albumCover.classList.remove('playing');
        }
    }

    function nextTrack() { currentIndex = (currentIndex + 1) % playlist.length; loadTrack(currentIndex); }
    function prevTrack() { currentIndex = (currentIndex - 1 + playlist.length) % playlist.length; loadTrack(currentIndex); }

    audio.ontimeupdate = () => {
        if (!isNaN(audio.duration)) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = pct + "%";
        }
    };

    progressContainer.onclick = (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        if (!isNaN(audio.duration)) {
            audio.currentTime = (clickX / width) * audio.duration;
        }
    };

    audio.onended = nextTrack;
    renderPlaylist();
</script>

</body>
</html>
